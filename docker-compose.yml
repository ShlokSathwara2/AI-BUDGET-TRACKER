version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb+srv://your-user:your-password@yourcluster.mongodb.net/budgetDB?retryWrites=true&w=majority
      - JWT_SECRET=your_super_secret_jwt_key
      - PORT=5000
    volumes:
      - ./server:/app/server
    command: npm run dev --prefix server

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:5000
    volumes:
      - ./client:/app
